
<!DOCTYPE html>
<html lang="en">

    <head>
        <link rel="stylesheet" href="./yes_style.css">
        <style>
        /* Ensure full viewport height for centering */
body, html {
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    background-color: #f8f8f8; /* Optional background */
    margin: 0;
    font-family: Arial, sans-serif;
}

/* Center the container */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Center the text */
.header_text {
    font-size: 28px;
    color: #ff3d3d;
    margin-bottom: 20px;
}

/* Center the image */
.gif_container img {
    display: block;
    max-width: 100%;
    height: auto;
    margin: 0 auto;
}
</style>
    </head> 
    <body>
        <div class="container">
            <div>
                <h1 class="header_text">Bleeeeeeh</h1>
            </div>
            <div class="gif_container">
                <img src="https://media.tenor.com/YTw87WdiaasAAAAi/tkthao219-capoo.gif">
            </div>
        </div>
    </body> 
</html>
